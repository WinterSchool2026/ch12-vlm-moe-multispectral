<h1 id="retrieval-output-interpretation">Retrieval Output Interpretation</h1>
<p>Analyze not only top-1 but:</p>
<ul>
<li>class diversity in top-k</li>
<li>confusion patterns by query wording</li>
<li>score margin between relevant and irrelevant results</li>
<li>brittle phrasing behavior</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="interpretability-stack-overview">Interpretability Stack Overview</h1>
<p>Three complementary views per layer:</p>
<ol>
<li>Routing assignment map (where tokens go)</li>
<li>Contribution map (which expert output magnitude dominates)</li>
<li>Ablation map (causal delta when expert removed)</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="deterministic-routing-for-analysis">Deterministic Routing for Analysis</h1>
<p><code>deterministic_routing(model)</code> temporarily disables gate noise.</p>
<p>Reason:</p>
<ul>
<li>Makes routing/contribution/ablation reproducible for the same sample</li>
<li>Prevents random gate noise from polluting interpretation</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="routing-assignment-map">Routing Assignment Map</h1>
<p>From <code>routing_assign_and_usage_for_layer(...)</code>:</p>
<ul>
<li>For each patch token, pick top-1 expert id</li>
<li>Produce patch grid map <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>A</mi><mo>∈</mo><mo stretchy="false">{</mo><mn>0</mn><mo separator="true">,</mo><mi mathvariant="normal">.</mi><mi mathvariant="normal">.</mi><mi mathvariant="normal">.</mi><mo separator="true">,</mo><mi>E</mi><mo>−</mo><mn>1</mn><msup><mo stretchy="false">}</mo><mrow><msub><mi>H</mi><mi>p</mi></msub><mo>×</mo><msub><mi>W</mi><mi>p</mi></msub></mrow></msup></mrow><annotation encoding="application/x-tex">A \in \{0,...,E-1\}^{H_p \times W_p}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7224em;vertical-align:-0.0391em;"></span><span class="mord mathnormal">A</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∈</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">{</span><span class="mord">0</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord">...</span><span class="mpunct">,</span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal" style="margin-right:0.05764em;">E</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1.0913em;vertical-align:-0.25em;"></span><span class="mord">1</span><span class="mclose"><span class="mclose">}</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.8413em;"><span style="top:-3.063em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.08125em;">H</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1645em;"><span style="top:-2.357em;margin-left:-0.0813em;margin-right:0.0714em;"><span class="pstrut" style="height:2.5em;"></span><span class="sizing reset-size3 size1 mtight"><span class="mord mathnormal mtight">p</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2819em;"><span></span></span></span></span></span></span><span class="mbin mtight">×</span><span class="mord mtight"><span class="mord mathnormal mtight" style="margin-right:0.13889em;">W</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1645em;"><span style="top:-2.357em;margin-left:-0.1389em;margin-right:0.0714em;"><span class="pstrut" style="height:2.5em;"></span><span class="sizing reset-size3 size1 mtight"><span class="mord mathnormal mtight">p</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2819em;"><span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></li>
<li>Compute per-expert usage counts</li>
</ul>
<p>Useful to see spatial expert specialization patterns</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="contribution-map">Contribution Map</h1>
<p>From <code>get_expert_contributions_for_layer(...)</code>:</p>
<p>Per token and expert:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi>c</mi><mrow><mi>t</mi><mo separator="true">,</mo><mi>e</mi></mrow></msub><mo>=</mo><mi mathvariant="normal">∥</mi><msub><mi>g</mi><mrow><mi>t</mi><mo separator="true">,</mo><mi>e</mi></mrow></msub><msub><mi>f</mi><mi>e</mi></msub><mo stretchy="false">(</mo><msub><mi>h</mi><mi>t</mi></msub><mo stretchy="false">)</mo><msub><mi mathvariant="normal">∥</mi><mn>2</mn></msub></mrow><annotation encoding="application/x-tex">c_{t,e}=\|g_{t,e} f_e(h_t)\|_2
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7167em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal">c</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.2806em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">t</span><span class="mpunct mtight">,</span><span class="mord mathnormal mtight">e</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1.0361em;vertical-align:-0.2861em;"></span><span class="mord">∥</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">g</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.2806em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">t</span><span class="mpunct mtight">,</span><span class="mord mathnormal mtight">e</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.10764em;">f</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:-0.1076em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">e</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord"><span class="mord mathnormal">h</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.2806em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">t</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mclose">)</span><span class="mord"><span class="mord">∥</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p>Then reshaped into patch maps.</p>
<p>Interpretation:</p>
<ul>
<li>High contribution means expert output strongly influences representation locally.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="causal-ablation-map">Causal Ablation Map</h1>
<p>From <code>compute_ablation_heatmaps(...)</code>:</p>
<p>For each expert <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>e</mi></mrow><annotation encoding="application/x-tex">e</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal">e</span></span></span></span>:</p>
<ol>
<li>Compute normal forward output</li>
<li>Remove expert <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>e</mi></mrow><annotation encoding="application/x-tex">e</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal">e</span></span></span></span> in target layer</li>
<li>Propagate through remaining layers</li>
<li>Measure token delta norm</li>
</ol>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><msub><mi mathvariant="normal">Δ</mi><mi>e</mi></msub><mo stretchy="false">(</mo><mi>t</mi><mo stretchy="false">)</mo><mo>=</mo><mi mathvariant="normal">∥</mi><msub><mi>y</mi><mi>t</mi></msub><mo>−</mo><msubsup><mi>y</mi><mi>t</mi><mrow><mo stretchy="false">(</mo><mo>−</mo><mi>e</mi><mo stretchy="false">)</mo></mrow></msubsup><msub><mi mathvariant="normal">∥</mi><mn>2</mn></msub></mrow><annotation encoding="application/x-tex">\Delta_e(t)=\|y_t - y_t^{(-e)}\|_2
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord">Δ</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">e</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mopen">(</span><span class="mord mathnormal">t</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord">∥</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.2806em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">t</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1.2948em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.0448em;"><span style="top:-2.4542em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">t</span></span></span><span style="top:-3.2198em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mopen mtight">(</span><span class="mord mtight">−</span><span class="mord mathnormal mtight">e</span><span class="mclose mtight">)</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2458em;"><span></span></span></span></span></span></span><span class="mord"><span class="mord">∥</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3011em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight">2</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span></span></p><p>Patchwise <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi mathvariant="normal">Δ</mi><mi>e</mi></msub></mrow><annotation encoding="application/x-tex">\Delta_e</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8333em;vertical-align:-0.15em;"></span><span class="mord"><span class="mord">Δ</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">e</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> gives causal importance map</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="55" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="why-ablation-matters">Why Ablation Matters</h1>
<p>Correlation-only interpretation can be misleading.</p>
<p>Causal ablation tests:</p>
<ul>
<li>If expert really matters, removing it should change representation where it was active.</li>
<li>Agreement between routing, contribution, and ablation is strong evidence of specialization.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="56" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="layer-report-utility">Layer Report Utility</h1>
<p><code>layer_report_simple(...)</code> in <code>analysis_utils.py</code> bundles:</p>
<ul>
<li>Usage bars</li>
<li>Routing overlay</li>
<li>Contribution heatmaps</li>
<li>Ablation heatmaps</li>
</ul>
<p>Good for fast qualitative diagnostics in notebooks and demos</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="57" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="expert-naming-objective">Expert Naming Objective</h1>
<p>Assign semantic labels to experts by matching expert prototypes to text prompts.</p>
<p>Concept:</p>
<ul>
<li>Compare to query bank embeddings</li>
<li>Rank prompt similarity</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="58" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="expert-naming-routing-labels">Expert Naming: Routing Labels</h1>
<p>The script can name experts using routing weighted class distributions:</p>
<p><span is="marp-span" data-auto-scaling="downscale-only" class="katex-display"><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML" display="block"><semantics><mrow><mi>p</mi><mo stretchy="false">(</mo><mi>y</mi><mi mathvariant="normal">∣</mi><mi>e</mi><mo stretchy="false">)</mo><mo>∝</mo><munder><mo>∑</mo><mi>i</mi></munder><msub><mi>w</mi><mrow><mi>i</mi><mo separator="true">,</mo><mi>e</mi></mrow></msub><mo>⋅</mo><mn mathvariant="bold">1</mn><mo stretchy="false">[</mo><msub><mi>y</mi><mi>i</mi></msub><mo>=</mo><mi>y</mi><mo stretchy="false">]</mo></mrow><annotation encoding="application/x-tex">p(y|e) \propto \sum_i w_{i,e} \cdot \mathbf{1}[y_i=y]
</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal">p</span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="mord">∣</span><span class="mord mathnormal">e</span><span class="mclose">)</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">∝</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:2.3277em;vertical-align:-1.2777em;"></span><span class="mop op-limits"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:1.05em;"><span style="top:-1.8723em;margin-left:0em;"><span class="pstrut" style="height:3.05em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span><span style="top:-3.05em;"><span class="pstrut" style="height:3.05em;"></span><span><span class="mop op-symbol large-op">∑</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:1.2777em;"><span></span></span></span></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.02691em;">w</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0269em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">i</span><span class="mpunct mtight">,</span><span class="mord mathnormal mtight">e</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">⋅</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathbf">1</span><span class="mopen">[</span><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3117em;"><span style="top:-2.55em;margin-left:-0.0359em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">i</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="mclose">]</span></span></span></span></span></p><p>Name candidates are top classes in <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>p</mi><mo stretchy="false">(</mo><mi>y</mi><mi mathvariant="normal">∣</mi><mi>e</mi><mo stretchy="false">)</mo></mrow><annotation encoding="application/x-tex">p(y|e)</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal">p</span><span class="mopen">(</span><span class="mord mathnormal" style="margin-right:0.03588em;">y</span><span class="mord">∣</span><span class="mord mathnormal">e</span><span class="mclose">)</span></span></span></span>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="59" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="suggested-interpretation-protocol">Suggested Interpretation Protocol</h1>
<p>For each selected layer:</p>
<ol>
<li>Inspect dominant routing experts</li>
<li>Compare top contribution and top ablation experts</li>
<li>Check if named semantics match visible tile content</li>
<li>Report disagreements explicitly as analysis findings</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="60" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="part-iv">Part IV</h1>
<h2 id="bonus-challenge-build-the-retrieval-app">Bonus Challenge: Build the Retrieval App</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="61" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="bonus-app-goal">Bonus App Goal</h1>
<p>Turn the research pipeline into an interactive, usable interface:</p>
<ul>
<li>Query by natural language</li>
<li>Browse top-k matches</li>
<li>Inspect per-layer expert behavior for a selected sample</li>
</ul>
<p>This demonstrates engineering maturity beyond experiments</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="62" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="existing-app-references">Existing App References</h1>
<ul>
<li>EuroSAT app:<br />
<code>scripts/app_retrieval_eurosat.py</code></li>
<li>BEN-L app:<br />
<code>scripts/app_retrieval.py</code></li>
</ul>
<p>Participants can either build from scratch or improve these</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="63" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="app-architecture">App Architecture</h1>
<img src="assets/figure2.png" alt="App Diagram" width="30%" height="80%" />

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="64" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="minimum-app-features">Minimum App Features</h1>
<ol>
<li>Checkpoint loading from saved config</li>
<li>Gallery embedding cache (disk persisted)</li>
<li>Top-k retrieval view with score and class info</li>
<li>Query bank dropdown + free text override</li>
<li>Class filter</li>
<li>Layer selector and expert visualization panel</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="65" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="caching-strategy">Caching Strategy</h1>
<p>Use cache key from:</p>
<ul>
<li>Checkpoint path + file stats</li>
<li>Split file path</li>
</ul>
<p>Then store tensor cache <code>Z</code>, labels, and indices.</p>
<p>This avoids re-encoding gallery every app refresh</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="66" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="robustness-in-app-code">Robustness in App Code</h1>
<p>If embedding dimension mismatch occurs:</p>
<ul>
<li>Rebuild cache automatically</li>
<li>Persist corrected cache</li>
</ul>
<p>This protects against stale cache after checkpoint changes</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="67" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="app-ux-suggestions-for-participants">App UX Suggestions for Participants</h1>
<ul>
<li>Keep query controls in sidebar</li>
<li>Use top-k image grid for fast scan</li>
<li>Let user select one sample for deep interpretability</li>
<li>Provide tabs for multiple layers</li>
<li>Show selected expert name if naming JSON is provided</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="68" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="part-v">Part V</h1>
<h2 id="instructor-live-demo-plan">Instructor Live Demo Plan</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="69" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="live-demo-sequence-recommended">Live Demo Sequence (Recommended)</h1>
<ol>
<li>Show model internals via source snippets</li>
<li>Run one retrieval query and inspect top-k</li>
<li>Open app and inspect one selected sample</li>
<li>Show routing vs contribution vs ablation on same layer</li>
<li>Show expert naming JSON and overlay names in app</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="70" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="demo-commands">Demo Commands</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Train (or use provided checkpoint)</span>

<span class="hljs-comment"># Retrieval</span>

<span class="hljs-comment"># Expert naming</span>
python scripts/run_expert_naming_semantic_eurosat.py ...

<span class="hljs-comment"># App</span>
streamlit run scripts/app_retrieval_eurosat.py -- ...
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="71" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="common-pitfalls-to-warn-participants-about">Common Pitfalls to Warn Participants About</h1>
<ul>
<li>Normalization mismatch between train and eval</li>
<li>Forgetting to normalize embeddings before similarity</li>
<li>Misinterpreting noisy gating without deterministic analysis mode</li>
<li>Over-claiming expert semantics without ablation evidence</li>
<li>Evaluating retrieval with too narrow query diversity</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="72" style="--paginate:true;--theme:default;" data-marpit-pagination-total="74">
<h1 id="suggested-presentation-structure">Suggested Presentation Structure</h1>
<ol>

<li>Training configuration</li>
<li>Retrieval results and failure analysis</li>
<li>Interpretability results (routing/contribution/ablation)</li>
<li>Expert naming results and uncertainty discussion</li>
<li>Bonus app screenshots/video (if implemented)</li>
</ol>
</section>
